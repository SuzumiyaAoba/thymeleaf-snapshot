plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.github.suzumiyaaoba'
version = '0.1.0-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

dependencies {
    // Thymeleaf
    api 'org.thymeleaf:thymeleaf:3.1.3.RELEASE'

    // JUnit 5
    api 'org.junit.jupiter:junit-jupiter-api:5.11.4'

    // HTML formatting (optional at runtime)
    implementation 'org.jsoup:jsoup:1.18.3'

    // Unified diff generation
    implementation 'io.github.java-diff-utils:java-diff-utils:4.12'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter-engine:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
        showExceptions true
        showStackTraces true
        exceptionFormat 'full'
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs += ['-parameters']
}

tasks.withType(Javadoc).configureEach {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            pom {
                name = 'Thymeleaf Snapshot Testing'
                description = 'Snapshot testing library for Thymeleaf template rendering with JUnit 5 support'
                url = 'https://github.com/SuzumiyaAoba/thymeleaf-snapshot'
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
            }
        }
    }
}
